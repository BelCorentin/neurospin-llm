# nginx — OVH reverse proxy for the Chainlit app
# Handles SSL termination via Let's Encrypt (certbot).
#
# Install:  apt install nginx certbot python3-certbot-nginx
# Get cert: certbot --nginx -d wiki-chat.neurospin.fr
# Place this file at: /etc/nginx/sites-available/neurospin-wiki
# Enable:   ln -s /etc/nginx/sites-available/neurospin-wiki /etc/nginx/sites-enabled/
#           nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name wiki-chat.neurospin.fr;   # ← change to your actual domain

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name wiki-chat.neurospin.fr;   # ← same domain

    # Certificates managed by certbot — paths filled in automatically
    ssl_certificate     /etc/letsencrypt/live/wiki-chat.neurospin.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wiki-chat.neurospin.fr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # Chainlit needs WebSocket support
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  300s;   # streaming responses can be long
        proxy_send_timeout  300s;
        proxy_buffering     off;    # required for SSE / streaming
    }
}
